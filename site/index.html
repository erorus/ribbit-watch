<!doctype html>
<html>
<head>
    <title>Ribbit Watch</title>
    <link rel="stylesheet" href="main.css?3">
    <link rel="icon" href="inv_frog2_darkgreen.jpg" id="icon-link">
    <script src="main.js?3"></script>
</head>
<body>
<div class="page-heading major-section">
    <div>
        <h1>Ribbit Watch</h1>
    </div>
    <div id="online-indicator">
        <span id="online-indicator-on">Online 🟢</span>
        <span id="online-indicator-off"><button id="online-connect">Connect</button> Offline 🔴</span>
    </div>
</div>
<div class="filter-container major-section">
    <div>
        <span>Products:&nbsp;</span><input type="text" id="products-filter" style="flex: 1 0 auto" placeholder="wow wowt wowxptr wow_beta wow_classic*"><label><input type="checkbox" id="encrypted-filter" CHECKED>+Encrypted</label>
    </div>
    <div>
        <span>Versions:&nbsp;</span>
        <label><input type="checkbox" class="columns-filter" value="BuildConfig" CHECKED>BuildConfig</label>
        <label><input type="checkbox" class="columns-filter" value="CDNConfig" CHECKED>CDNConfig</label>
        <label><input type="checkbox" class="columns-filter" value="KeyRing" CHECKED>KeyRing</label>
        <label><input type="checkbox" class="columns-filter" value="BuildId" CHECKED>BuildId</label>
        <label><input type="checkbox" class="columns-filter" value="VersionsName" CHECKED>VersionsName</label>
        <label><input type="checkbox" class="columns-filter" value="ProductConfig" CHECKED>ProductConfig</label>
    </div>
    <div>
        <span>CDNs:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
        <label><input type="checkbox" class="columns-filter" value="Path" CHECKED>Path</label>
        <label><input type="checkbox" class="columns-filter" value="Hosts" CHECKED>Hosts</label>
        <label><input type="checkbox" class="columns-filter" value="Servers" CHECKED>Servers</label>
        <label><input type="checkbox" class="columns-filter" value="ConfigPath" CHECKED>ConfigPath</label>
    </div>
    <div style="justify-content: space-between">
        <div>
            <label><input type="checkbox" id="notifications-input">Notifications</label>
            <span id="audio-autoplay-failed" style="color: #a11; cursor: help; display: none" title="Notification sound failed to play. Check browser settings in URL bar.">(Audio disabled.)</span>
        </div>
        <div>
            <button id="filters-reset">Reset</button>
            <button id="filters-load">Load</button>
            <button id="filters-save">Save</button>
        </div>
    </div>
</div>
<div id="updates-list-parent"></div>
<template id="update-header">
    <div class="updates-list-header">
        <span>Seq <a class="updates-list-sequence"></a></span><div class="updates-list-time"></div>
    </div>
</template>
<template id="update-row">
    <tr class="update-row">
        <td>
            <span class="update-row-product">
                <span class="update-row-product-lock"></span><a class="update-row-product-product"></a><span class="update-row-product-file"></span>
            </span>
        </td>
        <td><span class="update-row-keys"></span></td>
        <td class="update-row-field-name">
            <span class="update-row-field-name-name"></span>
        </td>
        <td class="update-row-field-values">
            <div class="update-row-field-values-new"></div>
            <div class="update-row-field-values-old old"></div>
        </td>
    </tr>
</template>
</body>
</html>
