## This only covers the server configs, not a full nginx.conf

server {
    server_name ribbit-watch.everynothing.net;
    listen 80;
    listen [::]:80;

    access_log off;
    error_log /var/www/ribbit-watch/log/error.log error;
    location / {
        return 301 https://ribbit-watch.everynothing.net$request_uri;
    }
}

server {
    server_name ribbit-watch.everynothing.net;
    listen 443 ssl;
    listen [::]:443 ssl;

    charset utf-8;

    log_not_found off;
    access_log /var/www/ribbit-watch/log/access.log;
    error_log  /var/www/ribbit-watch/log/error.log error;

    root /var/www/ribbit-watch/site;
    index index.html;
    gzip on;

    gzip_types application/javascript text/css application/json;

    location /events {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Connection '';
        proxy_buffering off;
        chunked_transfer_encoding off;
    }
}

server {
    server_name ribbit-ntfy.everynothing.net;
    listen 443 ssl;
    listen [::]:443 ssl;

    charset utf-8;

    log_not_found off;
    access_log /var/www/ribbit-watch/log/access.log;
    error_log  /var/www/ribbit-watch/log/error.log error;

    root /var/www/ribbit-watch/ntfy;

    location ~ /[-_A-Za-z0-9,]+/(auth|json|sse)$ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Connection '';
        proxy_buffering off;
        chunked_transfer_encoding off;
    }

    location ~ /[-_A-Za-z0-9,]+/ws$ {
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = / {
        return 301 https://ribbit-watch.everynothing.net/;
    }
}
